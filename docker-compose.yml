services:
  xenforo-vyhub-appealbot:
    container_name: xenforo-vyhub-appealbot
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    # Restart the bot automatically unless it was explicitly stopped.
    restart: unless-stopped
    # Proper PID 1 / signal handling and zombie reaping.
    init: true
    # The forum sits behind Cloudflare, which challenges requests coming from the
    # server's own IP. Since the forum (nginx) runs on this same host, resolve the
    # forum's hostname to the Docker bridge gateway so the bot talks to the local
    # origin directly and bypasses Cloudflare. TLS still validates against the real
    # Let's Encrypt certificate because the Host/SNI is unchanged.
    # NOTE: update the IP if XF_URL's hostname changes or the bridge gateway differs.
    extra_hosts:
      - 'willard.network:172.17.0.1'
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - VYHUB_API_URL=${VYHUB_API_URL}
      - VYHUB_API_KEY=${VYHUB_API_KEY}
      - XF_URL=${XF_URL}
      - XF_API_KEY=${XF_API_KEY}
      - FORUM_NODE_ID=${FORUM_NODE_ID}
      - FORUM_PREFIX=${FORUM_PREFIX}
    network_mode: 'bridge'
